<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    window.addEventListener('load', () => {
      const preloaded = [
        "/avenza.png",
        "/avenza2.png",
        "/loginImg.webp",
        "/logo.png",
        "/user.png",
        "/userLight.png",

      preloaded.forEach(src => {
        const img = new Image();
        img.src = src;
      });
    });
  </script>
